name: Bug Report
description: Report a bug to help us improve the project.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for reporting a bug!

        Please fill out the form below with as much detail as possible. This helps us investigate and resolve the issue quickly.

        > **Before reporting:** Please check if a similar issue already exists.

  - type: input
    id: module-version
    attributes:
      label: Module Version
      description: What version of HK2 ScrollTop are you using?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: input
    id: magento-version
    attributes:
      label: Magento Version
      description: What version of Magento are you running?
      placeholder: "e.g., 2.4.7"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      description: What PHP version is your Magento installation using?
      placeholder: "e.g., 8.2"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where does this bug occur?
      options:
        - Local Development
        - Development
        - Staging
        - Production
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system is your server running?
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: false

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of what the bug is.
      placeholder: "Describe the bug in detail..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue? Please provide step-by-step instructions.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "Describe what you expected to happen..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Describe what actually happened..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Output
      description: If applicable, paste any relevant logs or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      placeholder: "Drag and drop images here or paste image URLs..."
    validations:
      required: false
